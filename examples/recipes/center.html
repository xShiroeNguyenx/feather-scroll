<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recipe — Center / peek</title>
    <link rel="stylesheet" href="/packages/core/styles/core.css" />
    <link rel="stylesheet" href="./recipe.css" />
    <script type="importmap">
      { "imports": { "@feather-scroll/core": "/packages/core/dist/index.js" } }
    </script>
    <style>
      #center .fs__viewport { height: 320px; }
      .ccard {
        height: 100%; border-radius: var(--radius); color: #fff;
        display: grid; place-items: center; font-size: 2.4rem; font-weight: 800;
        transition: transform .35s ease, opacity .35s ease;
        transform: scale(.86); opacity: .55;
      }
      /* Active (centered) slide pops; neighbours stay dimmed/smaller for a peek look. */
      #center .fs__slide.is-active .ccard { transform: scale(1); opacity: 1; }
      .b0 { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
      .b1 { background: linear-gradient(135deg,#ec4899,#f43f5e); }
      .b2 { background: linear-gradient(135deg,#14b8a6,#0ea5e9); }
      .b3 { background: linear-gradient(135deg,#f59e0b,#ef4444); }
      .b4 { background: linear-gradient(135deg,#22c55e,#16a34a); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="recipe-head">
        <a class="back" href="./">← Recipes</a>
        <h1>🎯 Center / peek</h1>
        <p class="lead">Slide ở giữa được làm nổi, hai bên ló ra một phần (peek) nhờ <code>center</code> + <code>stagePadding</code>.</p>
        <div class="combo"><span class="lbl">Kết hợp:</span>
          <span class="tag">center</span><span class="tag">stagePadding</span>
          <span class="tag">loop</span><span class="tag">dots</span><span class="tag">autoplay</span><span class="tag">nav</span>
        </div>
      </div>

      <div id="center"></div>

      <p class="note">Class <code>is-active</code> được engine gắn vào slide ở giữa — ở đây dùng để phóng to/làm rõ slide đang chọn.</p>
    </div>

    <script type="module">
      import Carousel from '@feather-scroll/core';

      const root = document.getElementById('center');
      root.innerHTML = Array.from({ length: 6 }, (_, i) =>
        `<div class="ccard b${i % 5}">${i + 1}</div>`).join('');

      new Carousel('#center', {
        items: 1, center: true, stagePadding: 70, gap: 16,
        loop: true, nav: true, dots: true, drag: true,
        speed: 500, easing: 'easeOut',
        autoplay: { delay: 3000, pauseOnHover: true },
      });
    </script>
  </body>
</html>
