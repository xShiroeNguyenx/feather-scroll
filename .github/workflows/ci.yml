name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # pnpm version đọc từ "packageManager" trong package.json (không khai báo lại để tránh trùng)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build trước: adapters/effects/presets/test import lẫn nhau qua "dist" (checkout sạch chưa có).
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      # size-limit chỉ theo dõi/cảnh báo — không chặn release (quyết định đã chốt)
      - run: pnpm size || echo "::warning::bundle vượt mục tiêu (không chặn build)"
